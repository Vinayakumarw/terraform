name: Workflow, jobs, steps

on:
  push:
   branches:
     - master

jobs:
  first-pipeline:
    runs-on: ubuntu-22.04
    environment: STAGE
    steps:
      - name: Say welcome
        run: echo "welcome github actions"
      - name: welcome
        if: success()
        run: |
          echo "$(date)"
          echo " Let see $ENV_VAR "
          echo "Let see $ENV_SECRET"

  second-pipeline:
    runs-on: ubuntu-24.04
    environment: PROD
    needs: first-pipeline
    steps:
      - name: Execute
        run: |
          echo " $(ifconfig) "
          echo " Let see $ENV_SECRET_PROD "
          echo " Let see $ENV_VAR_PROD"

  third-pipeline:
    runs-on: ubuntu-24.04
    needs: first-pipeline
    steps:
      - name: Execute
        run: |
          echo " $(hostname) "
          echo " Let see $ENV_REPO secret"
          echo " Let see $ENV_REPO secret"
