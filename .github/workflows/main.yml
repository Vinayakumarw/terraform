name: Workflow, jobs, steps

on:
  push:
   branches:
     - master

jobs:
  first-pipeline:
    runs-on: ubuntu-22.04
    steps:
      - name: Say welcome
        run: echo "welcome github actions"
      - name: welcome
        if: success()
        run: echo "$(date)"

  second-pipeline:
    runs-on: ubuntu-24.04
    needs: first-pipeline
    steps:
      - name: Execute
        run: echo " $(ifconfig) "

  third-pipeline:
    runs-on: ubuntu-24.04
    needs: first-pipeline
    steps:
      - name: Execute
        run: echo " $(hostname) "
        
  
