name: Workflow, jobs, steps

on:
  push:
   branches:
     - master

jobs:
  stage-pipeline:
    runs-on: ubuntu-22.04
    environment: STAGE
    env:
      ENV_VAR: ${{ vars.ENV_VAR }}
      ENV_SECRET: ${{ secrets.ENV_SECRET}}
    
    steps:
      - name: Say welcome
        run: echo "welcome github actions"
      - name: env variable and secrets
        if: success()
        run: |
          echo "$(date)"
          echo " Let see $ENV_VAR "
          echo "Let see $ENV_SECRET secret"

  production-pipeline:
    runs-on: ubuntu-24.04
    environment: PRODUCTION
    env:
      ENV_SECRET_PROD: ${{ secrets.ENV_SECRET_PROD }}
      ENV_VAR_PROD: ${{ vars.ENV_VAR_PROD }}
    needs: stage-pipeline
    steps:
      - name: Execute
        run: |
          echo " $(ifconfig) "
          echo " Let see $ENV_SECRET_PROD secret"
          echo " Let see $ENV_VAR_PROD"

  third-pipeline:
    runs-on: ubuntu-24.04
    env:
      ENV_REPO: ${{ secrets.ENV_REPO }}
      ENV_REPO_VAR: ${{ vars.ENV_REPO_VAR }}
    needs: stage-pipeline
    steps:
      - name: Execute
        run: |
          echo " $(hostname) "
          echo " Let see $ENV_REPO secret"
          echo " Let see $ENV_REPO_VAR "

  Agent-variable:
    runs-on: ubuntu-22.04
    needs: stage-pipeline
    steps:
      - name: Agent vaiable and secrets
        run: |
          echo "Lets see ${{ secrets.AGENT }} secrets"
          echo "Lets see ${{ vars.AGENT_VAR }}" 
