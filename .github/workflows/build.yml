name: Reusable Build Pipeline

on:
  workflow_call:
    # Define inputs that the caller workflow must supply
    inputs:
      environment:
        required: true
        type: string
    # Define secrets that the caller workflow must supply
    secrets:
      ENV_SECRET:
        required: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Build
        run: |
          echo "Building for target environment: ${{ inputs.environment }}"
          echo "Using secret token: ${{ secrets.ENV_SECRET }} look it"