name: artifact upload and download

on:
  push:
    branches:
      - master

jobs:
  artifact-producer:
    name: Produce Artifact
    runs-on: namespace-profile-vinaykumar
    steps:
      - name: Checkout code
        uses: namespace-actions/upload-artifact@v1

      - name: Create artifact
        run: |
          echo "This is a sample artifact" > artifact.txt
          echo "Welcome to the artifact upload and download workflow!" >> artifact.txt

      - name: Upload artifact
        uses: namespace-actions/upload-artifact@v1
        with:
          name: sample-artifact
          path: artifact.txt
    
  artifact-consumer:
    name: Consume Artifact
    runs-on: namespace-profile-vinaykumar
    needs: artifact-producer
    steps:
      - name: Download artifact
        uses:  namespace-actions/download-artifact@v2
        with:
          name: sample-artifact

      - name: Display artifact content
        run: |
            cat artifact.txt